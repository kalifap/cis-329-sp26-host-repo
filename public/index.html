<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Welcome to the Store</h1>
    
    <div id="product-list">
        <div class="product">
            <h3>Cool T-Shirt</h3>
            <p>$25.00</p>
            <button onclick="addToCart({ id: 101, name: 'Cool T-Shirt', price: 25 })">
                Add to Cart
            </button>
        </div>
    </div>

    <hr>

    <h2>Your Shopping Cart</h2>
    <div id="cart-list">
        </div>
    
<button onclick="viewCart()">Refresh Cart View</button>
<button class="clear-btn" onclick="clearCart()">Clear Cart</button>

    <script src="script.js"></script>
</body>
</html>
